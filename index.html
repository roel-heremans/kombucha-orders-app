<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kombucha Orders</title>
  <style>
    :root { --green:#4a7c59; --bg:#faf9f6; --card:#fff; --line:#e3e1da; --text:#222; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); }
    header { background:var(--green); color:#fff; padding:12px 16px; font-weight:600; }
    nav { display:flex; overflow-x:auto; background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
    nav button { flex:1 0 auto; border:none; background:none; padding:12px 14px; font-size:14px; color:var(--text); }
    nav button.active { color:var(--green); border-bottom:2px solid var(--green); font-weight:600; }
    main { padding:16px; max-width:640px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:14px; }
    label { display:block; font-size:13px; margin:8px 0 4px; color:#555; }
    input, select, textarea { width:100%; padding:10px; font-size:16px; border:1px solid var(--line); border-radius:8px; background:#fff; }
    button.primary { background:var(--green); color:#fff; border:none; padding:12px; border-radius:8px; font-size:16px; width:100%; }
    button.link { background:none; border:none; color:var(--green); padding:6px 0; font-size:14px; }
    summary { cursor:pointer; padding:4px 0; font-weight:600; }
    #restaurantLogout { color:#fff; border:1px solid rgba(255,255,255,.75); border-radius:6px; padding:5px 12px; font-weight:600; text-decoration:none; }
    .row { display:flex; gap:8px; align-items:flex-end; }
    .row > * { flex:1; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { text-align:left; padding:6px; border-bottom:1px solid var(--line); }
    .muted { color:#888; font-size:13px; }
    .hidden { display:none; }
    pre { white-space:pre-wrap; background:#f4f3ee; padding:12px; border-radius:8px; font-size:13px; overflow-x:auto; }
    .banner { background:#fff3cd; color:#7a5b00; padding:8px 16px; font-size:13px; text-align:center; }
    .badge { display:inline-block; min-width:18px; padding:0 5px; border-radius:9px;
      background:#c0392b; color:#fff; font-size:11px; line-height:18px; text-align:center; }
    .badge.hidden { display:none; }
  </style>
</head>
<body>
  <header>🍶 Kombucha Orders</header>
  <div id="offlineBanner" class="banner hidden">Offline — changes will sync when back online</div>

  <!-- Login view -->
  <main id="loginView">
    <div class="card">
      <h3>Log in</h3>
      <label>Email</label>
      <input id="loginEmail" type="email" autocomplete="username" />
      <label>Password</label>
      <input id="loginPassword" type="password" autocomplete="current-password" />
      <p id="loginError" class="muted"></p>
      <button class="primary" id="loginBtn">Log in</button>
    </div>
  </main>

  <!-- App view -->
  <div id="appView" class="hidden">
    <nav>
      <button data-view="new" class="active">New</button>
      <button data-view="deliveries">Deliveries</button>
      <button data-view="orders">Orders <span id="ordersBadge" class="badge hidden"></span></button>
      <button data-view="dashboard">Dashboard</button>
      <button data-view="recibo">Recibo</button>
      <button data-view="settings">Settings</button>
    </nav>
    <main>
      <div id="view-new" class="view"></div>
      <div id="view-deliveries" class="view hidden"></div>
      <div id="view-orders" class="view hidden"></div>
      <div id="view-dashboard" class="view hidden"></div>
      <div id="view-recibo" class="view hidden"></div>
      <div id="view-settings" class="view hidden"></div>
    </main>
  </div>

  <!-- Restaurant view (non-admin users) -->
  <div id="restaurantView" class="hidden">
    <header style="padding:12px 16px;border-bottom:1px solid var(--line)">
      <strong id="restaurantTitle">Kombucha orders</strong>
      <button class="link" id="restaurantLogout" style="float:right">Log out</button>
    </header>
    <main id="restaurantBody" style="padding:16px"></main>
  </div>

  <script src="lib.js"></script>
  <script type="module">
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { collection, doc, onSnapshot, addDoc, setDoc, updateDoc, deleteDoc, getDoc, query, where, serverTimestamp, writeBatch }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Replace with your Firebase web app config (see docs/FIREBASE_SETUP.md)
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDkb9kN0vzaaR25K29k3Sl2dlZaql5VdaM",
      authDomain: "kombucha-orders-72014.firebaseapp.com",
      projectId: "kombucha-orders-72014",
      storageBucket: "kombucha-orders-72014.firebasestorage.app",
      messagingSenderId: "260178477505",
      appId: "1:260178477505:web:cc670a3534ca6469f9ef40",
    };

    const ADMIN_EMAILS = ["roel.heremans@gmail.com", "reissnina@gmail.com"];

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = initializeFirestore(app, {
      localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }),
    });

    // Expose to later-task code via a single namespace.
    window.APP = { app, auth, db, state: { customers: [], flavours: [], deliveries: [], orders: [], recibos: [], settings: null }, current: {} };
    window.APP.esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

    // Online/offline banner
    const banner = document.getElementById("offlineBanner");
    window.addEventListener("online", () => banner.classList.add("hidden"));
    window.addEventListener("offline", () => banner.classList.remove("hidden"));
    if (!navigator.onLine) banner.classList.remove("hidden");

    // Auth wiring
    const loginView = document.getElementById("loginView");
    const appView = document.getElementById("appView");
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      const pw = document.getElementById("loginPassword").value;
      document.getElementById("loginError").textContent = "";
      try { await signInWithEmailAndPassword(auth, email, pw); }
      catch (e) { document.getElementById("loginError").textContent = "Login failed: " + e.code; }
    });

    window.APP.logout = () => signOut(auth);

    const restaurantView = document.getElementById("restaurantView");
    document.getElementById("restaurantLogout").addEventListener("click", () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        loginView.classList.remove("hidden");
        appView.classList.add("hidden");
        restaurantView.classList.add("hidden");
        return;
      }
      window.APP.user = user;
      loginView.classList.add("hidden");
      if (ADMIN_EMAILS.includes(user.email)) {
        window.APP.role = "admin";
        restaurantView.classList.add("hidden");
        appView.classList.remove("hidden");
        if (window.APP.onLogin) window.APP.onLogin();
      } else {
        window.APP.role = "restaurant";
        appView.classList.add("hidden");
        restaurantView.classList.remove("hidden");
        if (window.APP.onRestaurantLogin) window.APP.onRestaurantLogin(user.uid);
      }
    });

    // Nav switching
    document.querySelectorAll("nav button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("nav button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".view").forEach((v) => v.classList.add("hidden"));
        document.getElementById("view-" + btn.dataset.view).classList.remove("hidden");
        if (window.APP.onViewShown) window.APP.onViewShown(btn.dataset.view);
      });
    });

    const S = window.APP.state;
    window.APP.renderers = {};

    window.APP.render = function () {
      if (window.APP.updateOrdersBadge) window.APP.updateOrdersBadge();
      const active = document.querySelector("nav button.active");
      const view = active ? active.dataset.view : "new";
      if (window.APP.renderers[view]) window.APP.renderers[view]();
    };
    window.APP.onViewShown = function (view) {
      if (window.APP.renderers[view]) window.APP.renderers[view]();
    };

    window.APP.customerName = (id) => (S.customers.find((c) => c.id === id) || {}).name || "(unknown)";
    window.APP.flavourName = (id) => (S.flavours.find((f) => f.id === id) || {}).name || "(unknown)";

    const DEFAULT_SETTINGS = {
      reciboHeader: "OUT - Kombucha Produto",
      sizes: [
        { id: "1L", label: "1 L", price: 8, deposit: 0 },
        { id: "270ml", label: "270 ml", price: 4.5, deposit: 1 },
      ],
    };

    function watch(name, target) {
      onSnapshot(collection(db, name), (snap) => {
        target.length = 0;
        snap.forEach((d) => target.push(Object.assign({ id: d.id }, d.data())));
        window.APP.render();
      });
    }

    window.APP.onLogin = async function () {
      // Seed settings on first run.
      const settingsRef = doc(db, "settings", "app");
      const existing = await getDoc(settingsRef);
      if (!existing.exists()) await setDoc(settingsRef, DEFAULT_SETTINGS);
      onSnapshot(settingsRef, (d) => {
        S.settings = d.exists() ? d.data() : DEFAULT_SETTINGS;
        window.APP.render();
      });
      watch("customers", S.customers);
      watch("flavours", S.flavours);
      watch("deliveries", S.deliveries);
      watch("orders", S.orders);
      watch("recibos", S.recibos);
      window.APP.render();
    };

    window.APP.onRestaurantLogin = function (uid) {
      // Reference data (rules allow any signed-in user to read these).
      const settingsRef = doc(db, "settings", "app");
      onSnapshot(settingsRef, (d) => { S.settings = d.exists() ? d.data() : DEFAULT_SETTINGS; window.APP.renderRestaurant(); });
      onSnapshot(collection(db, "flavours"), (snap) => {
        S.flavours.length = 0;
        snap.forEach((d) => S.flavours.push(Object.assign({ id: d.id }, d.data())));
        window.APP.renderRestaurant();
      });
      // Own customer doc (matched by uid).
      onSnapshot(query(collection(db, "customers"), where("uid", "==", uid)), (snap) => {
        const list = [];
        snap.forEach((d) => list.push(Object.assign({ id: d.id }, d.data())));
        window.APP.myCustomer = list[0] || null;
        window.APP.renderRestaurant();
      });
      // Own orders.
      onSnapshot(query(collection(db, "orders"), where("customerUid", "==", uid)), (snap) => {
        S.orders.length = 0;
        snap.forEach((d) => S.orders.push(Object.assign({ id: d.id }, d.data())));
        window.APP.renderRestaurant();
      });
      // Own recibos (metadata only; file bytes fetched on demand).
      onSnapshot(query(collection(db, "recibos"), where("customerUid", "==", uid)), (snap) => {
        S.recibos.length = 0;
        snap.forEach((d) => S.recibos.push(Object.assign({ id: d.id }, d.data())));
        window.APP.renderRestaurant();
      });
    };
    window.APP.renderRestaurant = function () {}; // replaced in Task 6

    // CRUD
    window.APP.addDelivery = (o) => addDoc(collection(db, "deliveries"), o);
    window.APP.updateDelivery = (id, o) => updateDoc(doc(db, "deliveries", id), o);
    window.APP.deleteDelivery = (id) => deleteDoc(doc(db, "deliveries", id));
    window.APP.addCustomer = (name, notes) => addDoc(collection(db, "customers"), { name, notes: notes || "" });
    window.APP.updateCustomer = (id, o) => updateDoc(doc(db, "customers", id), o);
    window.APP.deleteCustomer = (id) => deleteDoc(doc(db, "customers", id));
    window.APP.addFlavour = (name) => addDoc(collection(db, "flavours"), { name });
    window.APP.deleteFlavour = (id) => deleteDoc(doc(db, "flavours", id));
    window.APP.saveSettings = (o) => setDoc(doc(db, "settings", "app"), o);
    window.APP.addOrder = (o) => addDoc(collection(db, "orders"), o);
    window.APP.cancelOrder = (id) => updateDoc(doc(db, "orders", id), { status: "cancelled" });
    window.APP.setOrderDelivered = (id, deliveryId) => updateDoc(doc(db, "orders", id), { status: "delivered", deliveryId });
    window.APP.uploadRecibo = function (customerId, customerUid, monthKey, fileName, size, base64, uploadedBy) {
      const id = KO.reciboDocId(customerId, monthKey);
      const batch = writeBatch(db);
      batch.set(doc(db, "recibos", id), {
        customerId, customerUid, monthKey, fileName, size,
        uploadedAt: serverTimestamp(), uploadedBy: uploadedBy || "",
      });
      batch.set(doc(db, "reciboFiles", id), { customerUid, data: base64, contentType: "application/pdf" });
      return batch.commit();
    };
    window.APP.deleteRecibo = function (id) {
      const batch = writeBatch(db);
      batch.delete(doc(db, "recibos", id));
      batch.delete(doc(db, "reciboFiles", id));
      return batch.commit();
    };
    window.APP.fetchReciboFile = function (id) { return getDoc(doc(db, "reciboFiles", id)); };
    window.APP.serverTimestamp = serverTimestamp;

    window.APP.createRestaurantLogin = async function (customerId, email, password) {
      const name = "rlogin-" + customerId;
      let secondary;
      try { secondary = initializeApp(FIREBASE_CONFIG, name); }
      catch (e) { secondary = initializeApp(FIREBASE_CONFIG, name + "-2"); }
      try {
        const secAuth = getAuth(secondary);
        const cred = await createUserWithEmailAndPassword(secAuth, email, password);
        await updateDoc(doc(db, "customers", customerId), { uid: cred.user.uid, email });
        await signOut(secAuth);
      } finally {
        if (secondary) await deleteApp(secondary);
      }
    };
  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const A = window.APP, KO = window.KO;
    const container = document.getElementById("view-new");
    let editing = null; // delivery id being edited, or null
    let fulfilling = null; // order id being fulfilled, or null
    let built = false;  // whether the form shell is currently built

    function sizeOptions(selected) {
      return (A.state.settings ? A.state.settings.sizes : [])
        .map((s) => `<option value="${s.id}" ${s.id === selected ? "selected" : ""}>${A.esc(s.label)}</option>`).join("");
    }
    function flavourOptionsHtml(selected) {
      const opts = A.state.flavours
        .slice().sort((a, b) => a.name.localeCompare(b.name))
        .map((f) => `<option value="${f.id}" ${f.id === selected ? "selected" : ""}>${A.esc(f.name)}</option>`).join("");
      return `<option value="">— choose flavour —</option>` + opts + `<option value="__new__">➕ Add new flavour…</option>`;
    }
    function customerOptionsHtml(selected) {
      const opts = A.state.customers
        .slice().sort((a, b) => a.name.localeCompare(b.name))
        .map((c) => `<option value="${c.id}" ${c.id === selected ? "selected" : ""}>${A.esc(c.name)}</option>`).join("");
      return `<option value="">— choose customer —</option>` + opts + `<option value="__new__">➕ Add new customer…</option>`;
    }

    function itemRow(item) {
      item = item || { sizeId: "", flavourId: "", quantity: 1 };
      const div = document.createElement("div");
      div.className = "row item-row";
      div.innerHTML =
        `<div><label>Size</label><select class="it-size">${sizeOptions(item.sizeId)}</select></div>` +
        `<div><label>Flavour</label><select class="it-flav">${flavourOptionsHtml(item.flavourId)}</select></div>` +
        `<div style="flex:0 0 64px"><label>Qty</label><input class="it-qty" type="number" min="1" value="${item.quantity}"/></div>` +
        `<button class="link it-del" style="flex:0 0 32px">✕</button>`;
      div.querySelector(".it-flav").addEventListener("change", (e) => onFlavourChange(e).then(updateSubtotal));
      div.querySelector(".it-qty").addEventListener("input", updateSubtotal);
      div.querySelector(".it-size").addEventListener("change", updateSubtotal);
      div.querySelector(".it-del").addEventListener("click", (e) => { e.preventDefault(); div.remove(); updateSubtotal(); });
      return div;
    }

    async function onFlavourChange(e) {
      const sel = e.target;
      if (sel.value === "__new__") {
        const name = prompt("New flavour name:");
        if (name && name.trim()) {
          const ref = await A.addFlavour(name.trim());
          refreshOptions();
          sel.value = ref.id;
        } else { sel.value = ""; }
      }
    }

    // Repopulate dropdown option lists from current state, preserving selections.
    function refreshOptions() {
      const custSel = container.querySelector("#cust");
      if (custSel) { const v = custSel.value; custSel.innerHTML = customerOptionsHtml(v); custSel.value = v; }
      container.querySelectorAll(".it-flav").forEach((sel) => {
        const v = sel.value; sel.innerHTML = flavourOptionsHtml(v); sel.value = v;
      });
    }

    function emptiesRows() {
      return (A.state.settings ? A.state.settings.sizes : []).map((s) =>
        `<div class="row"><div><label>${A.esc(s.label)} empties back</label>` +
        `<input class="emp-qty" data-size="${s.id}" type="number" min="0" value="0"/></div></div>`).join("");
    }

    function updateSubtotal() {
      const delivery = readForm();
      const total = KO.deliveryRevenue(delivery, A.state.settings ? A.state.settings.sizes : []);
      const el = container.querySelector("#subtotal");
      if (el) el.textContent = KO.formatMoney(total);
    }

    function readForm() {
      const items = [];
      container.querySelectorAll(".item-row").forEach((r) => {
        const sizeId = r.querySelector(".it-size").value;
        const flavourId = r.querySelector(".it-flav").value;
        const quantity = parseInt(r.querySelector(".it-qty").value, 10) || 0;
        if (sizeId && flavourId && flavourId !== "__new__" && quantity > 0)
          items.push({ sizeId, flavourId, quantity });
      });
      const empties = [];
      container.querySelectorAll(".emp-qty").forEach((i) => {
        const q = parseInt(i.value, 10) || 0;
        if (q > 0) empties.push({ sizeId: i.dataset.size, quantity: q });
      });
      return {
        customerId: container.querySelector("#cust").value,
        date: container.querySelector("#date").value,
        items, empties,
        note: container.querySelector("#note").value.trim(),
      };
    }

    function todayStr() {
      const d = new Date();
      const off = d.getTimezoneOffset();
      return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
    }

    function buildForm() {
      container.innerHTML =
        `<div class="card">` +
        `<h3>${editing ? "Edit" : fulfilling ? "Fulfil order" : "New"} delivery</h3>` +
        (fulfilling && !editing ? `<p class="muted">Fulfilling a requested order — saving will mark it delivered.</p>` : "") +
        `<label>Customer</label><select id="cust">${customerOptionsHtml("")}</select>` +
        `<label>Date</label><input id="date" type="date" value="${todayStr()}"/>` +
        `<h4>Bottles delivered</h4><div id="items"></div>` +
        `<button class="link" id="addItem">➕ Add line</button>` +
        `<h4>Empties received back</h4>${emptiesRows()}` +
        `<label>Note (optional)</label><textarea id="note" rows="2"></textarea>` +
        `<p><strong>Subtotal: €<span id="subtotal">0.00</span></strong></p>` +
        `<p id="formErr" class="muted"></p>` +
        `<button class="primary" id="save">${editing ? "Update" : "Save"} delivery</button>` +
        ((editing || fulfilling) ? `<button class="link" id="cancelEdit">${editing ? "Cancel edit" : "Cancel fulfilment"}</button>` : "") +
        `</div>`;

      const itemsDiv = container.querySelector("#items");
      itemsDiv.appendChild(itemRow());

      container.querySelector("#cust").addEventListener("change", async (e) => {
        if (e.target.value === "__new__") {
          const name = prompt("New customer name:");
          if (name && name.trim()) { const ref = await A.addCustomer(name.trim()); refreshOptions(); e.target.value = ref.id; }
          else e.target.value = "";
        }
      });
      container.querySelector("#addItem").addEventListener("click", (e) => { e.preventDefault(); itemsDiv.appendChild(itemRow()); });
      container.querySelector("#save").addEventListener("click", onSave);
      if (editing || fulfilling) container.querySelector("#cancelEdit").addEventListener("click", (e) => { e.preventDefault(); editing = null; fulfilling = null; built = false; renderNew(); });
      built = true;
      updateSubtotal();
    }

    function renderNew() {
      if (!A.state.settings) { container.innerHTML = "<p class='muted'>Loading…</p>"; built = false; return; }
      if (built && container.querySelector("#cust")) { refreshOptions(); return; }
      buildForm();
    }

    async function onSave(e) {
      e.preventDefault();
      const d = readForm();
      const err = container.querySelector("#formErr");
      if (!d.customerId || d.customerId === "__new__") { err.textContent = "Please choose a customer."; return; }
      if (!d.date) { err.textContent = "Please choose a date."; return; }
      if (d.items.length === 0) { err.textContent = "Add at least one bottle line."; return; }
      try {
        if (editing) { await A.updateDelivery(editing, d); editing = null; }
        else {
          d.enteredBy = A.user ? A.user.email : "";
          const ref = await A.addDelivery(d);
          const orderId = fulfilling;
          fulfilling = null;
          if (orderId) await A.setOrderDelivered(orderId, ref.id);
        }
        built = false;
        renderNew();
        container.querySelector("#formErr").textContent = "Saved ✓";
      } catch (ex) { err.textContent = "Save failed: " + ex.message; }
    }

    A.editDelivery = function (id) {
      const d = A.state.deliveries.find((x) => x.id === id);
      if (!d) return;
      editing = id;
      fulfilling = null;
      built = false;
      renderNew();
      container.querySelector("#cust").value = d.customerId;
      container.querySelector("#date").value = d.date;
      const itemsDiv = container.querySelector("#items");
      itemsDiv.innerHTML = "";
      (d.items || []).forEach((it) => itemsDiv.appendChild(itemRow(it)));
      if ((d.items || []).length === 0) itemsDiv.appendChild(itemRow());
      (d.empties || []).forEach((emp) => {
        const inp = container.querySelector(`.emp-qty[data-size="${emp.sizeId}"]`);
        if (inp) inp.value = emp.quantity;
      });
      container.querySelector("#note").value = d.note || "";
      updateSubtotal();
      document.querySelector('nav button[data-view="new"]').click();
    };

    A.fulfilOrder = function (orderId) {
      const o = A.state.orders.find((x) => x.id === orderId);
      if (!o) return;
      editing = null;
      fulfilling = orderId;
      built = false;
      renderNew();
      container.querySelector("#cust").value = o.customerId;
      if (o.preferredDate) container.querySelector("#date").value = o.preferredDate;
      const itemsDiv = container.querySelector("#items");
      itemsDiv.innerHTML = "";
      (o.items || []).forEach((it) => itemsDiv.appendChild(itemRow(it)));
      if ((o.items || []).length === 0) itemsDiv.appendChild(itemRow());
      container.querySelector("#note").value = o.note || "";
      updateSubtotal();
      document.querySelector('nav button[data-view="new"]').click();
    };

    A.renderers.new = renderNew;
  });
  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const A = window.APP, KO = window.KO;
    const container = document.getElementById("view-deliveries");

    function itemSummary(d, sizes) {
      return (d.items || []).map((it) => {
        const s = KO.sizeById(sizes, it.sizeId);
        return it.quantity + "× " + A.esc(s ? s.label : it.sizeId) + " " + A.esc(A.flavourName(it.flavourId));
      }).join(", ");
    }

    function emptiesSummary(d, sizes) {
      return (d.empties || []).map((e) => {
        const s = KO.sizeById(sizes, e.sizeId);
        return e.quantity + "× " + A.esc(s ? s.label : e.sizeId);
      }).join(", ");
    }

    function render() {
      const sizes = A.state.settings ? A.state.settings.sizes : [];
      const list = A.state.deliveries.slice().sort((a, b) => (a.date < b.date ? 1 : -1));
      if (list.length === 0) { container.innerHTML = "<p class='muted'>No deliveries yet.</p>"; return; }
      container.innerHTML = list.map((d) =>
        `<div class="card">` +
        `<strong>${A.esc(A.customerName(d.customerId))}</strong> — ${d.date}<br/>` +
        `<span class="muted">${itemSummary(d, sizes)}</span><br/>` +
        `Revenue: €${KO.formatMoney(KO.deliveryRevenue(d, sizes))}` +
        ((d.empties || []).length ? ` · Empties back: ${emptiesSummary(d, sizes)}` : "") +
        `<div style="margin-top:8px">` +
        `<button class="link" data-edit="${d.id}">Edit</button> · ` +
        `<button class="link" data-del="${d.id}">Delete</button></div>` +
        `</div>`).join("");

      container.querySelectorAll("[data-edit]").forEach((b) =>
        b.addEventListener("click", () => A.editDelivery(b.dataset.edit)));
      container.querySelectorAll("[data-del]").forEach((b) =>
        b.addEventListener("click", async () => {
          if (confirm("Delete this delivery?")) await A.deleteDelivery(b.dataset.del);
        }));
    }

    A.renderers.deliveries = render;
  });
  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const A = window.APP, KO = window.KO;
    const container = document.getElementById("view-orders");
    const badge = document.getElementById("ordersBadge");

    let showFinished = false; // session-only: reveal Delivered/Cancelled history

    function byNewest(a, b) {
      const ta = (a.createdAt && a.createdAt.seconds) || 0;
      const tb = (b.createdAt && b.createdAt.seconds) || 0;
      return tb - ta;
    }

    function orderCard(o, sizes) {
      const summary = KO.orderItemsSummary(o, sizes, A.flavourName);
      const status = KO.orderStatusLabel(o.status);
      const when = o.preferredDate ? `<div class="muted">Preferred: ${A.esc(o.preferredDate)}</div>` : "";
      const note = o.note ? `<div class="muted">Note: ${A.esc(o.note)}</div>` : "";
      const actions = o.status === "requested"
        ? `<div class="row"><button class="primary" data-fulfil="${o.id}">Fulfil…</button>` +
          `<button class="link" data-cancel="${o.id}">Cancel</button></div>`
        : "";
      return `<div class="card"><strong>${A.esc(A.customerName(o.customerId))}</strong> — ${status}` +
        `<div>${A.esc(summary)}</div>${when}${note}${actions}</div>`;
    }

    function updateBadge() {
      const n = A.state.orders.filter((o) => o.status === "requested").length;
      badge.textContent = n;
      badge.classList.toggle("hidden", n === 0);
    }

    function render() {
      updateBadge();
      const sizes = A.state.settings ? A.state.settings.sizes : [];
      const pending = A.state.orders.filter((o) => o.status === "requested").slice().sort(byNewest);
      const finished = A.state.orders.filter((o) => o.status !== "requested").slice().sort(byNewest);

      let html = pending.length
        ? pending.map((o) => orderCard(o, sizes)).join("")
        : (A.state.orders.length ? "<p class='muted'>No pending orders.</p>" : "<p class='muted'>No orders yet.</p>");

      if (showFinished) html += finished.map((o) => orderCard(o, sizes)).join("");

      if (finished.length) {
        html += `<p class="muted" style="margin-top:8px"><button class="link" id="toggleFinished">` +
          (showFinished ? "Hide finished orders" : "Show finished orders (" + finished.length + ")") +
          `</button></p>`;
      }
      container.innerHTML = html;

      container.querySelectorAll("[data-fulfil]").forEach((b) =>
        b.addEventListener("click", () => A.fulfilOrder(b.dataset.fulfil)));
      container.querySelectorAll("[data-cancel]").forEach((b) =>
        b.addEventListener("click", async () => {
          if (confirm("Cancel this order?")) await A.cancelOrder(b.dataset.cancel);
        }));
      const tf = container.querySelector("#toggleFinished");
      if (tf) tf.addEventListener("click", () => { showFinished = !showFinished; render(); });
    }

    A.renderers.orders = render;
    A.updateOrdersBadge = updateBadge;
  });
  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const A = window.APP, KO = window.KO;
    const container = document.getElementById("view-dashboard");

    const TYPE_COLORS = { private: "#3d6b8c", restaurant: "#4a7c59" };

    function currentMonthKey() {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
    }

    function euro(v) { return "€" + KO.formatMoney(v); }

    function legendHtml(items) {
      return `<div class="muted" style="margin-top:6px;font-size:12px">` +
        items.map((it) =>
          `<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${it.color};margin:0 4px 0 10px;vertical-align:middle"></span>${A.esc(it.label)}`
        ).join("") + `</div>`;
    }

    function typeBars(rows, labelOf) {
      // rows: [{ private, restaurant, total, ... }]; labelOf(row) -> {label, tipLabel}
      return rows.map((r) => {
        const meta = labelOf(r);
        return {
          label: meta.label,
          tip: `${meta.tipLabel} — Private ${euro(r.private)} · Restaurant ${euro(r.restaurant)} · Total ${euro(r.total)}`,
          segments: [
            { value: r.private, color: TYPE_COLORS.private },
            { value: r.restaurant, color: TYPE_COLORS.restaurant },
          ],
        };
      });
    }

    function render() {
      const sizes = A.state.settings ? A.state.settings.sizes : [];
      const w = A.current.dashWindow || (A.current.dashWindow = { preset: "this-month" });
      const { startMk, endMk } = KO.resolveWindow(w.preset, w.startMk, w.endMk, currentMonthKey());
      const label = KO.windowLabel(startMk, endMk);

      const monthKeys = KO.monthKeysBetween(startMk, endMk);
      const typeSeries = KO.revenueTypeSeries(A.state.deliveries, sizes, A.state.customers, monthKeys);
      const winTotals = KO.revenueByTypeInWindow(A.state.deliveries, sizes, A.state.customers, startMk, endMk);
      const byCust = KO.revenueByCustomerInWindow(A.state.deliveries, sizes, startMk, endMk);
      const flavours = KO.flavourCountsInWindow(A.state.deliveries, startMk, endMk);
      const outstanding = KO.outstandingByCustomer(A.state.deliveries, sizes);
      const yearly = KO.revenueTypeByYear(A.state.deliveries, sizes, A.state.customers);

      const monthChart = KO.stackedBarChartSVG(
        typeBars(typeSeries, (r) => ({ label: KO.monthName(r.monthKey).slice(0, 3), tipLabel: KO.windowLabel(r.monthKey, r.monthKey) })),
        {});
      const yearChart = KO.stackedBarChartSVG(
        typeBars(yearly, (r) => ({ label: r.year, tipLabel: r.year })),
        {});
      const custChart = KO.barChartSVG(
        byCust.map((c) => ({ label: A.customerName(c.customerId).slice(0, 10), title: A.customerName(c.customerId), value: c.amount })),
        { format: euro, rotate: true });
      const typeLegend = legendHtml([
        { label: "Private", color: TYPE_COLORS.private },
        { label: "Restaurant", color: TYPE_COLORS.restaurant },
      ]);

      const isCustom = w.preset === "custom";
      container.innerHTML =
        `<div class="card"><label>Window</label>` +
          `<select id="dashPreset">` +
            `<option value="this-month" ${w.preset === "this-month" ? "selected" : ""}>This month</option>` +
            `<option value="last-month" ${w.preset === "last-month" ? "selected" : ""}>Last month</option>` +
            `<option value="this-year" ${w.preset === "this-year" ? "selected" : ""}>This year</option>` +
            `<option value="custom" ${isCustom ? "selected" : ""}>Custom range…</option>` +
          `</select>` +
          (isCustom ?
            `<div class="row"><div><label>Start</label><input id="dashStart" type="month" value="${startMk}"/></div>` +
            `<div><label>End</label><input id="dashEnd" type="month" value="${endMk}"/></div></div>` : "") +
          `<p class="muted" style="margin-top:6px">Showing: ${A.esc(label)}</p></div>` +
        `<div class="card"><h3>Revenue: ${euro(winTotals.total)}</h3>` +
          `<p class="muted">Private ${euro(winTotals.private)} · Restaurant ${euro(winTotals.restaurant)}</p>` +
          `<div class="chartwrap"><div class="chart-tip muted">Tap a bar to see its value</div>${monthChart}</div>` +
          typeLegend + `</div>` +
        `<div class="card"><h4>Yearly revenue (all years)</h4>` +
          (yearly.length ? `<div class="chartwrap"><div class="chart-tip muted">Tap a bar to see its value</div>${yearChart}</div>` + typeLegend
            : "<p class='muted'>No revenue yet.</p>") + `</div>` +
        `<div class="card"><h4>By customer</h4>` +
          (byCust.length ? `<div class="chartwrap"><div class="chart-tip muted">Tap a bar to see its value</div>${custChart}</div>` + "<table>" + byCust.map((c) =>
            `<tr><td>${A.esc(A.customerName(c.customerId))}</td><td>${euro(c.amount)}</td></tr>`).join("") + "</table>"
            : "<p class='muted'>No revenue in this window.</p>") + `</div>` +
        `<div class="card"><h4>Outstanding bottles & deposit</h4>` +
          (outstanding.length ? "<table><tr><th>Customer</th><th>Out</th><th>Deposit</th></tr>" +
            outstanding.map((o) =>
              `<tr><td>${A.esc(A.customerName(o.customerId))}</td>` +
              `<td>${Object.keys(o.perSize).map((sid) => { const s = KO.sizeById(sizes, sid); return o.perSize[sid] + "× " + A.esc(s ? s.label : sid); }).join(", ") || "0"}</td>` +
              `<td>${euro(o.depositHeld)}</td></tr>`).join("") + "</table>"
            : "<p class='muted'>Nothing outstanding.</p>") + `</div>` +
        `<div class="card"><h4>Flavour popularity (${A.esc(label)})</h4>` +
          (flavours.length ? "<table>" + flavours.map((f) =>
            `<tr><td>${A.esc(A.flavourName(f.flavourId))}</td><td>${f.quantity}</td></tr>`).join("") + "</table>"
            : "<p class='muted'>No deliveries in this window.</p>") + `</div>`;

      container.querySelector("#dashPreset").addEventListener("change", (e) => {
        A.current.dashWindow = { preset: e.target.value, startMk, endMk };
        render();
      });
      const startInp = container.querySelector("#dashStart");
      const endInp = container.querySelector("#dashEnd");
      if (startInp) startInp.addEventListener("change", (e) => {
        A.current.dashWindow = { preset: "custom", startMk: e.target.value, endMk };
        render();
      });
      if (endInp) endInp.addEventListener("change", (e) => {
        A.current.dashWindow = { preset: "custom", startMk, endMk: e.target.value };
        render();
      });
    }

    // One delegated listener (bars are re-created on every render): tap a bar to
    // show its value in that chart's caption. pointerdown fires reliably for both
    // touch (iOS Safari doesn't always fire click on SVG shapes) and mouse.
    function showTip(e) {
      const bar = e.target.closest ? e.target.closest("[data-tip]") : null;
      if (!bar) return;
      const wrap = bar.closest(".chartwrap");
      const tip = wrap && wrap.querySelector(".chart-tip");
      if (tip) tip.textContent = bar.getAttribute("data-tip");
    }
    container.addEventListener("pointerdown", showTip);
    container.addEventListener("click", showTip); // fallback for older browsers

    A.renderers.dashboard = render;
  });
  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const A = window.APP, KO = window.KO;
    const container = document.getElementById("view-recibo");

    function currentMonthKey() {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
    }

    const MAX_PDF = 700 * 1024;

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const s = String(reader.result);
          const comma = s.indexOf(",");
          resolve(comma >= 0 ? s.slice(comma + 1) : s);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function uploaderHtml(custId, mk, cust) {
      const uploads = A.state.recibos
        .filter((r) => r.customerId === custId)
        .slice().sort((a, b) => (a.monthKey < b.monthKey ? 1 : -1));
      const linked = cust && cust.uid;
      const listHtml = uploads.length
        ? uploads.map((r) =>
            `<div class="row" style="justify-content:space-between">` +
            `<div>${A.esc(KO.windowLabel(r.monthKey, r.monthKey))} — ${A.esc(r.fileName)}</div>` +
            `<button class="link" data-delrec="${r.id}">Delete</button></div>`).join("")
        : "<p class='muted'>No RV PDFs uploaded for this customer.</p>";
      return `<div class="card"><h4>Upload RV PDF</h4>` +
        (linked
          ? `<p class="muted">For ${A.esc(cust.name)} · ${A.esc(KO.windowLabel(mk, mk))} (replaces any existing PDF for that month).</p>` +
            `<input id="ruFile" type="file" accept="application/pdf"/>` +
            `<button class="primary" id="ruUpload">Upload PDF</button>`
          : `<p class="muted">This customer has no app login yet — create one in Settings → Restaurant logins before uploading their recibos.</p>`) +
        `<p id="ruMsg" class="muted"></p>` +
        `<h4 style="margin-top:12px">Uploaded recibos</h4>${listHtml}</div>`;
    }

    function render() {
      if (!A.state.settings) { container.innerHTML = "<p class='muted'>Loading…</p>"; return; }
      const custId = A.current.reciboCust || "";
      const mk = A.current.reciboMonth || (A.current.reciboMonth = currentMonthKey());
      const custOpts = `<option value="">— choose —</option>` + A.state.customers
        .slice().sort((a, b) => a.name.localeCompare(b.name))
        .map((c) => `<option value="${c.id}" ${c.id === custId ? "selected" : ""}>${A.esc(c.name)}</option>`).join("");

      let text = "";
      if (custId) {
        const cust = A.state.customers.find((c) => c.id === custId);
        text = KO.generateRecibo(A.state.deliveries, custId, mk, A.state.settings.sizes, A.state.settings.reciboHeader, cust ? cust.nif : "");
      }

      container.innerHTML =
        `<div class="card">` +
        `<label>Customer</label><select id="rcust">${custOpts}</select>` +
        `<label>Month</label><input id="rmonth" type="month" value="${mk}"/>` +
        `</div>` +
        (custId
          ? `<div class="card"><pre id="rtext">${A.esc(text)}</pre>` +
              `<button class="primary" id="copyBtn">Copy to clipboard</button>` +
              `<p id="copyMsg" class="muted"></p></div>` +
              uploaderHtml(custId, mk, A.state.customers.find((c) => c.id === custId))
          : `<p class="muted">Choose a customer to generate the recibo text.</p>`);

      container.querySelector("#rcust").addEventListener("change", (e) => { A.current.reciboCust = e.target.value; render(); });
      container.querySelector("#rmonth").addEventListener("change", (e) => { A.current.reciboMonth = e.target.value; render(); });
      const copyBtn = container.querySelector("#copyBtn");
      if (copyBtn) copyBtn.addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(text); container.querySelector("#copyMsg").textContent = "Copied ✓"; }
        catch (e) { container.querySelector("#copyMsg").textContent = "Copy failed — select the text manually."; }
      });

      const ruUpload = container.querySelector("#ruUpload");
      if (ruUpload) ruUpload.addEventListener("click", async () => {
        const fileInput = container.querySelector("#ruFile");
        const file = fileInput && fileInput.files && fileInput.files[0];
        const setMsg = (t) => { const m = container.querySelector("#ruMsg"); if (m) m.textContent = t; };
        if (!file) { setMsg("Choose a PDF file first."); return; }
        const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
        if (!isPdf) { setMsg("Only PDF files are allowed."); return; }
        if (file.size > MAX_PDF) { setMsg("PDF too large (max 700 KB). Please shrink it and try again."); return; }
        const cust = A.state.customers.find((c) => c.id === custId);
        if (!cust || !cust.uid) { setMsg("This customer has no app login yet."); return; }
        ruUpload.disabled = true; setMsg("Uploading…");
        try {
          const base64 = await fileToBase64(file);
          await A.uploadRecibo(custId, cust.uid, mk, file.name, file.size, base64, A.user ? A.user.email : "");
          const m = container.querySelector("#ruMsg"); if (m) m.textContent = "Uploaded ✓";
        } catch (ex) {
          const m = container.querySelector("#ruMsg"); if (m) m.textContent = "Upload failed: " + (ex.code || ex.message);
          const b = container.querySelector("#ruUpload"); if (b) b.disabled = false;
        }
      });

      container.querySelectorAll("[data-delrec]").forEach((b) =>
        b.addEventListener("click", async () => {
          if (confirm("Delete this recibo PDF?")) await A.deleteRecibo(b.dataset.delrec);
        }));
    }

    A.renderers.recibo = render;
  });
  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const A = window.APP, KO = window.KO;
    const container = document.getElementById("view-settings");

    function customerInUse(id) { return A.state.deliveries.some((d) => d.customerId === id); }
    function flavourInUse(id) { return A.state.deliveries.some((d) => (d.items || []).some((it) => it.flavourId === id)); }

    function render() {
      const st = A.state.settings;
      if (!st) { container.innerHTML = "<p class='muted'>Loading…</p>"; return; }

      container.innerHTML =
        `<div class="card"><h4>Account</h4><p class="muted">${A.user ? A.user.email : ""}</p>` +
          `<button class="link" id="logoutBtn">Log out</button></div>` +
        `<div class="card"><details><summary>Bottle sizes &amp; prices</summary>` +
          st.sizes.map((s, i) =>
            `<div class="row" data-idx="${i}">` +
            `<div><label>Label</label><input class="s-label" value="${A.esc(s.label)}"/></div>` +
            `<div><label>Price €</label><input class="s-price" type="number" step="0.5" value="${s.price}"/></div>` +
            `<div><label>Deposit €</label><input class="s-dep" type="number" step="0.5" value="${s.deposit}"/></div>` +
            `</div>`).join("") +
          `<label>Recibo header text</label><input id="recHeader" value="${A.esc(st.reciboHeader)}"/>` +
          `<button class="primary" id="saveSettings">Save settings</button>` +
          `<p id="setMsg" class="muted"></p></details></div>` +
        `<div class="card"><details><summary>Customers (${A.state.customers.length})</summary>` +
          `<p class="muted">Set each customer's type, NIF and notes. Add new customers from the New delivery screen.</p>` +
          A.state.customers.slice().sort((a,b)=>a.name.localeCompare(b.name)).map((c) =>
            `<div class="cust-edit" data-cid="${c.id}" style="border-top:1px solid var(--line);padding-top:8px;margin-top:8px">` +
            `<label>Name</label><input class="c-name" value="${A.esc(c.name)}"/>` +
            `<div class="row"><div><label>Type</label><select class="c-type">` +
              `<option value="restaurant" ${(c.type||"restaurant")==="restaurant"?"selected":""}>Restaurant</option>` +
              `<option value="private" ${c.type==="private"?"selected":""}>Private</option>` +
            `</select></div>` +
            `<div><label>NIF</label><input class="c-nif" value="${A.esc(c.nif||"")}"/></div></div>` +
            `<label>Notes</label><input class="c-notes" value="${A.esc(c.notes||"")}"/>` +
            `<div class="row"><button class="link c-save">Save</button>` +
            `<button class="link" data-delcust="${c.id}" style="flex:0 0 60px">Delete</button></div>` +
            `</div>`).join("") +
          `</details></div>` +
        `<div class="card"><details><summary>Flavours (${A.state.flavours.length})</summary>` +
          A.state.flavours.slice().sort((a,b)=>a.name.localeCompare(b.name)).map((f) =>
            `<div class="row"><div>${A.esc(f.name)}</div>` +
            `<button class="link" data-delflav="${f.id}" style="flex:0 0 60px">Delete</button></div>`).join("") +
          `</details></div>` +
        `<div class="card"><details><summary>Restaurant logins</summary>` +
          `<p class="muted">Create an app login so a restaurant can place their own orders.</p>` +
          `<label>Customer</label><select id="rlCust">` +
            A.state.customers.slice().sort((a,b)=>a.name.localeCompare(b.name)).map((c) =>
              `<option value="${c.id}">${A.esc(c.name)}${c.uid ? " ✓ has login" : ""}</option>`).join("") +
          `</select>` +
          `<label>Login email</label><input id="rlEmail" type="email"/>` +
          `<label>Initial password</label><input id="rlPw" type="text" value=""/>` +
          `<button class="primary" id="rlCreate">Create login</button>` +
          `<p id="rlMsg" class="muted"></p></details></div>` +
        `<div class="card"><h4>Backup</h4>` +
          `<button class="link" id="exportBtn">Export all data (JSON)</button></div>`;

      container.querySelector("#logoutBtn").addEventListener("click", () => A.logout());

      container.querySelector("#saveSettings").addEventListener("click", async () => {
        const sizes = Array.from(container.querySelectorAll(".row[data-idx]")).map((row, i) => ({
          id: st.sizes[i].id,
          label: row.querySelector(".s-label").value.trim(),
          price: parseFloat(row.querySelector(".s-price").value) || 0,
          deposit: parseFloat(row.querySelector(".s-dep").value) || 0,
        }));
        await A.saveSettings({ sizes, reciboHeader: container.querySelector("#recHeader").value.trim() });
        container.querySelector("#setMsg").textContent = "Saved ✓";
      });

      container.querySelectorAll(".cust-edit").forEach((card) =>
        card.querySelector(".c-save").addEventListener("click", async () => {
          const save = card.querySelector(".c-save");
          try {
            await A.updateCustomer(card.dataset.cid, {
              name: card.querySelector(".c-name").value.trim(),
              type: card.querySelector(".c-type").value,
              nif: card.querySelector(".c-nif").value.trim(),
              notes: card.querySelector(".c-notes").value.trim(),
            });
            save.textContent = "Saved ✓";
          } catch (e) { save.textContent = "Save failed"; }
        }));

      container.querySelectorAll("[data-delcust]").forEach((b) =>
        b.addEventListener("click", async () => {
          if (customerInUse(b.dataset.delcust)) { alert("Cannot delete: this customer has deliveries."); return; }
          if (confirm("Delete this customer?")) await A.deleteCustomer(b.dataset.delcust);
        }));
      container.querySelectorAll("[data-delflav]").forEach((b) =>
        b.addEventListener("click", async () => {
          if (flavourInUse(b.dataset.delflav)) { alert("Cannot delete: this flavour is used by deliveries."); return; }
          if (confirm("Delete this flavour?")) await A.deleteFlavour(b.dataset.delflav);
        }));

      container.querySelector("#exportBtn").addEventListener("click", () => {
        const data = {
          version: 1, exportedAt: new Date().toISOString(),
          settings: A.state.settings, customers: A.state.customers,
          flavours: A.state.flavours, deliveries: A.state.deliveries,
          orders: A.state.orders,
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "kombucha-backup.json"; a.click();
        URL.revokeObjectURL(url);
      });

      const rlCreate = container.querySelector("#rlCreate");
      if (rlCreate) rlCreate.addEventListener("click", async () => {
        const msg = container.querySelector("#rlMsg");
        const customerId = container.querySelector("#rlCust").value;
        const email = container.querySelector("#rlEmail").value.trim();
        const pw = container.querySelector("#rlPw").value;
        if (!customerId || !email || pw.length < 6) { msg.textContent = "Choose a customer, email, and a password of 6+ chars."; return; }
        rlCreate.disabled = true; msg.textContent = "Creating…";
        try {
          await A.createRestaurantLogin(customerId, email, pw);
          const okMsg = container.querySelector("#rlMsg");
          if (okMsg) okMsg.textContent = "Login created ✓ — give the restaurant this email + password.";
        } catch (ex) {
          const failMsg = container.querySelector("#rlMsg");
          if (failMsg) failMsg.textContent = "Failed: " + (ex.code || ex.message);
        }
        finally { rlCreate.disabled = false; }
      });
    }

    A.renderers.settings = render;
  });
  </script>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const A = window.APP, KO = window.KO;
    const body = document.getElementById("restaurantBody");
    const title = document.getElementById("restaurantTitle");
    let showCleared = false; // session-only: reveal locally-hidden finished orders

    // "Cleared" finished orders are hidden from this device only (localStorage);
    // nothing is deleted and admins still see every order.
    function hiddenKey() { return "ko_hidden_orders_" + (A.user ? A.user.uid : ""); }
    function getHidden() {
      try { return new Set(JSON.parse(localStorage.getItem(hiddenKey()) || "[]")); }
      catch (e) { return new Set(); }
    }
    function saveHidden(set) {
      try { localStorage.setItem(hiddenKey(), JSON.stringify(Array.from(set))); } catch (e) {}
    }

    function sizeOptions() {
      return (A.state.settings ? A.state.settings.sizes : [])
        .map((s) => `<option value="${s.id}">${A.esc(s.label)}</option>`).join("");
    }
    function flavourOptions() {
      return `<option value="">— choose flavour —</option>` +
        A.state.flavours.slice().sort((a, b) => a.name.localeCompare(b.name))
          .map((f) => `<option value="${f.id}">${A.esc(f.name)}</option>`).join("");
    }
    function itemRowHtml() {
      return `<div class="row order-item">` +
        `<div><label>Size</label><select class="oi-size">${sizeOptions()}</select></div>` +
        `<div><label>Flavour</label><select class="oi-flav">${flavourOptions()}</select></div>` +
        `<div style="flex:0 0 64px"><label>Qty</label><input class="oi-qty" type="number" min="1" value="1"/></div>` +
        `<button class="link oi-del" style="flex:0 0 32px">✕</button></div>`;
    }

    function myOrders() {
      const uid = A.user ? A.user.uid : null;
      return A.state.orders.filter((o) => o.customerUid === uid).slice().sort((a, b) => {
        const ta = (a.createdAt && a.createdAt.seconds) || 0;
        const tb = (b.createdAt && b.createdAt.seconds) || 0;
        return tb - ta;
      });
    }

    function render() {
      if (A.role !== "restaurant") return;
      if (!A.state.settings) { body.innerHTML = "<p class='muted'>Loading…</p>"; return; }
      if (!A.myCustomer) {
        body.innerHTML = "<div class='card'><p>Your account isn't linked to a customer yet. Please contact us.</p></div>";
        return;
      }
      title.textContent = A.myCustomer.name;
      const sizes = A.state.settings.sizes;
      const all = myOrders();
      const hidden = getHidden();
      const isFinished = (o) => o.status === "delivered" || o.status === "cancelled";
      const visible = showCleared ? all : all.filter((o) => !hidden.has(o.id));
      const clearable = all.filter((o) => isFinished(o) && !hidden.has(o.id));
      const hiddenCount = all.filter((o) => hidden.has(o.id)).length;

      const ordersBody =
        all.length === 0 ? "<p class='muted'>No orders yet.</p>" :
        visible.length === 0 ? "<p class='muted'>All finished orders cleared.</p>" :
        visible.map((o) => {
          const cancel = o.status === "requested"
            ? ` <button class="link" data-cancelmine="${o.id}">Cancel</button>` : "";
          return `<div class="row" style="justify-content:space-between">` +
            `<div><div>${A.esc(KO.orderItemsSummary(o, sizes, A.flavourName))}</div>` +
            `<div class="muted">${KO.orderStatusLabel(o.status)}${o.preferredDate ? " · " + A.esc(o.preferredDate) : ""}</div></div>` +
            `<div>${cancel}</div></div>`;
        }).join("");

      body.innerHTML =
        `<div class="card"><h3>New order</h3>` +
          `<div id="orderItems">${itemRowHtml()}</div>` +
          `<button class="link" id="addOrderLine">➕ Add line</button>` +
          `<label>Preferred date (optional)</label><input id="orderDate" type="date"/>` +
          `<label>Note (optional)</label><textarea id="orderNote" rows="2"></textarea>` +
          `<p id="orderErr" class="muted"></p>` +
          `<button class="primary" id="sendOrder">Send order</button></div>` +
        `<div class="card">` +
          `<div class="row" style="justify-content:space-between;align-items:center">` +
            `<h3 style="margin:0">Your orders</h3>` +
            (clearable.length ? `<button class="link" id="clearFinished">Clear finished</button>` : "") +
          `</div>` +
          ordersBody +
          (hiddenCount ? `<p class="muted" style="margin-top:8px"><button class="link" id="toggleCleared">${showCleared ? "Hide cleared orders" : "Show cleared orders (" + hiddenCount + ")"}</button></p>` : "") +
        `</div>`;

      const itemsDiv = body.querySelector("#orderItems");
      body.querySelector("#addOrderLine").addEventListener("click", (e) => {
        e.preventDefault();
        const tmp = document.createElement("div");
        tmp.innerHTML = itemRowHtml();
        itemsDiv.appendChild(tmp.firstElementChild);
      });
      itemsDiv.addEventListener("click", (e) => {
        if (e.target.classList.contains("oi-del")) { e.preventDefault(); e.target.closest(".order-item").remove(); }
      });
      body.querySelector("#sendOrder").addEventListener("click", onSend);
      body.querySelectorAll("[data-cancelmine]").forEach((b) =>
        b.addEventListener("click", async () => {
          if (confirm("Cancel this order?")) await A.cancelOrder(b.dataset.cancelmine);
        }));
      const clearBtn = body.querySelector("#clearFinished");
      if (clearBtn) clearBtn.addEventListener("click", () => {
        const hidden = getHidden();
        myOrders().forEach((o) => {
          if (o.status === "delivered" || o.status === "cancelled") hidden.add(o.id);
        });
        saveHidden(hidden);
        showCleared = false;
        render();
      });
      const toggleBtn = body.querySelector("#toggleCleared");
      if (toggleBtn) toggleBtn.addEventListener("click", () => { showCleared = !showCleared; render(); });
    }

    async function onSend() {
      const err = body.querySelector("#orderErr");
      const btn = body.querySelector("#sendOrder");
      const items = [];
      body.querySelectorAll(".order-item").forEach((r) => {
        const sizeId = r.querySelector(".oi-size").value;
        const flavourId = r.querySelector(".oi-flav").value;
        const quantity = parseInt(r.querySelector(".oi-qty").value, 10) || 0;
        if (sizeId && flavourId && quantity > 0) items.push({ sizeId, flavourId, quantity });
      });
      if (items.length === 0) { err.textContent = "Add at least one bottle line with a flavour."; return; }
      if (btn) btn.disabled = true;
      try {
        await A.addOrder({
          customerId: A.myCustomer.id,
          customerUid: A.user.uid,
          items,
          preferredDate: body.querySelector("#orderDate").value || "",
          note: body.querySelector("#orderNote").value.trim(),
          status: "requested",
          createdAt: A.serverTimestamp(),
        });
        const msg = document.getElementById("orderErr");
        if (msg) msg.textContent = "Order sent ✓";
      } catch (ex) {
        const msg = document.getElementById("orderErr");
        if (msg) msg.textContent = "Send failed: " + ex.message;
        const b2 = document.getElementById("sendOrder");
        if (b2) b2.disabled = false;
      }
    }

    A.renderRestaurant = render;
  });
  </script>
</body>
</html>
